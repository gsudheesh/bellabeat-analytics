name: 'bellabeat'
version: '1.0.0'
config-version: 2

profile: 'bellabeat'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  bellabeat:
    staging:
      +schema: stg
      +materialized: table
    analytics:
      +schema: analytics
      +materialized: table
    report:
      +schema: report
      +materialized: table
