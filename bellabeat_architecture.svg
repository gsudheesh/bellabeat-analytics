  <text x="105" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#e8829a">RAW CSVs</text>
  <text x="105" y="122" text-anchor="middle" font-size="8.5" fill="#9a9ab8">Kaggle / Fitbit</text>
  <line x1="55" y1="132" x2="155" y2="132" stroke="#3a3a5a" stroke-width="1"/>
  <text x="105" y="148" text-anchor="middle" font-size="8" fill="#7a7a9a">29 CSV files</text>
  <text x="105" y="163" text-anchor="middle" font-size="8" fill="#7a7a9a">2 export periods</text>
  <text x="105" y="178" text-anchor="middle" font-size="8" fill="#7a7a9a">Mar – May 2016</text>
  <text x="105" y="196" text-anchor="middle" font-size="8" fill="#c2607a">2.77M minute rows</text>

