<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8829a"/>
      <stop offset="100%" style="stop-color:#c2607a"/>
    </linearGradient>
    <linearGradient id="darkBox" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a4a"/>
      <stop offset="100%" style="stop-color:#1e1e3a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#c2607a" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c2607a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="420" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="70" x2="1000" y2="70"/>
    <line x1="0" y1="140" x2="1000" y2="140"/>
    <line x1="0" y1="210" x2="1000" y2="210"/>
    <line x1="0" y1="280" x2="1000" y2="280"/>
    <line x1="0" y1="350" x2="1000" y2="350"/>
  </g>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#e8829a" letter-spacing="3" filter="url(#glow)">BELLABEAT FITNESS ANALYTICS</text>
  <text x="500" y="56" text-anchor="middle" font-size="10" fill="#7a7a9a" letter-spacing="4">END-TO-END DATA PIPELINE ARCHITECTURE</text>

  <!-- Layer labels on left -->
  <text x="18" y="158" font-size="8" fill="#7a7a9a" letter-spacing="2" transform="rotate(-90, 18, 158)">INGEST</text>
  <text x="18" y="238" font-size="8" fill="#7a7a9a" letter-spacing="2" transform="rotate(-90, 18, 238)">STAGE</text>
  <text x="18" y="318" font-size="8" fill="#7a7a9a" letter-spacing="2" transform="rotate(-90, 18, 318)">MODEL</text>

  <!-- ── BOX 1: Raw CSVs ── -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="130" height="130" rx="8" fill="url(#darkBox)" stroke="#c2607a" stroke-width="1.5"/>
  </g>
