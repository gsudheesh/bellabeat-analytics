  <text x="282" y="122" text-anchor="middle" font-size="8.5" fill="#9a9ab8">raw schema</text>
  <line x1="225" y1="132" x2="340" y2="132" stroke="#3a3a5a" stroke-width="1"/>
  <text x="282" y="148" text-anchor="middle" font-size="8" fill="#7a7a9a">28 tables</text>
  <text x="282" y="163" text-anchor="middle" font-size="8" fill="#7a7a9a">Exact CSV copies</text>
  <text x="282" y="178" text-anchor="middle" font-size="8" fill="#7a7a9a">Append-only</text>
  <text x="282" y="196" text-anchor="middle" font-size="8" fill="#c2607a">DBeaver 26 IDE</text>

