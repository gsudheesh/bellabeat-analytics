  <line x1="357" y1="145" x2="393" y2="145" stroke="#c2607a" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,2"/>
  <text x="375" y="138" text-anchor="middle" font-size="7" fill="#7a7a9a">dbt run</text>

