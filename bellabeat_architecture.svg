  <text x="467" y="163" text-anchor="middle" font-size="8" fill="#7a7a9a">Type casting</text>
  <text x="467" y="178" text-anchor="middle" font-size="8" fill="#7a7a9a">Deduplication</text>
  <text x="467" y="196" text-anchor="middle" font-size="8" fill="#c2607a">24 dupes removed</text>

