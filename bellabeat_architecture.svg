  <!-- Stat items -->
  <!-- Col 1 -->
  <text x="110" y="310" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">47</text>
  <text x="110" y="326" text-anchor="middle" font-size="8" fill="#7a7a9a">Total Tables</text>
  <text x="110" y="355" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">35</text>
  <text x="110" y="371" text-anchor="middle" font-size="8" fill="#7a7a9a">Unique Users</text>

  <!-- Col 2 -->
  <text x="250" y="310" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">15</text>
  <text x="250" y="326" text-anchor="middle" font-size="8" fill="#7a7a9a">dbt Models</text>
  <text x="250" y="355" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">23</text>
  <text x="250" y="371" text-anchor="middle" font-size="8" fill="#7a7a9a">dbt Tests · 100% ✓</text>

  <!-- Col 3 -->
  <text x="390" y="310" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">2.77M</text>
  <text x="390" y="326" text-anchor="middle" font-size="8" fill="#7a7a9a">Minute Records</text>
  <text x="390" y="355" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">1,373</text>
  <text x="390" y="371" text-anchor="middle" font-size="8" fill="#7a7a9a">Clean Daily Records</text>

  <!-- Col 4 -->
  <text x="540" y="310" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">29</text>
  <text x="540" y="326" text-anchor="middle" font-size="8" fill="#7a7a9a">Source CSVs</text>
  <text x="540" y="355" text-anchor="middle" font-size="22" font-weight="bold" fill="#e8829a">4</text>
  <text x="540" y="371" text-anchor="middle" font-size="8" fill="#7a7a9a">Dashboard Pages</text>

