  <g filter="url(#shadow)">
    <rect x="395" y="80" width="145" height="130" rx="8" fill="url(#darkBox)" stroke="#c2607a" stroke-width="1.5"/>
  </g>
  <rect x="395" y="80" width="145" height="6" rx="3" fill="url(#pinkGrad)"/>
  <text x="467" y="106" text-anchor="middle" font-size="11" font-weight="bold" fill="#e8829a">dbt STAGING</text>
  <text x="467" y="122" text-anchor="middle" font-size="8.5" fill="#9a9ab8">stg schema</text>
