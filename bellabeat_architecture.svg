  <line x1="175" y1="295" x2="175" y2="385" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="315" y1="295" x2="315" y2="385" stroke="#2a2a4a" stroke-width="1"/>
  <line x1="460" y1="295" x2="460" y2="385" stroke="#2a2a4a" stroke-width="1"/>

  <!-- Tech stack footer -->
