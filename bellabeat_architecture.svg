  <!-- Decorative corner accents -->
  <path d="M40,80 L55,80 L55,86" fill="none" stroke="#c2607a" stroke-width="1.5"/>
  <path d="M960,80 L945,80 L945,86" fill="none" stroke="#c2607a" stroke-width="1.5"/>
  <path d="M40,400 L55,400 L55,394" fill="none" stroke="#c2607a" stroke-width="1.5"/>
  <path d="M960,400 L945,400 L945,394" fill="none" stroke="#c2607a" stroke-width="1.5"/>
